<!-- Header Section -->
<header class="bg-white h-20 md:h-24 border-b border-zinc-100 sticky top-0 z-50 flex items-center px-4 md:px-8 shadow-sm">
  <div class="max-w-[96%] xl:max-w-[1580px] mx-auto w-full flex items-center justify-between relative">
    <!-- Logo Area -->
    <div class="flex items-center space-x-3 md:space-x-4">
      <img src="{{header.logo.img}}" alt="L&T Finance Logo" class="h-7 md:h-9 object-contain w-auto" />
      <span class="h-5 md:h-6 w-[1px] bg-zinc-200 block"></span>
      <!-- Partner/Special Presentation -->
      <img src="./assets/images/yourstorylogo.png" alt="YourStory Logo" class="h-5 md:h-7 object-contain w-auto" />
    </div>
    
    <!-- Navigation Links (Desktop only) -->
    <nav class="hidden lg:flex items-center space-x-6 md:space-x-8">
      {{#each header.navLinks}}
        <a href="{{this.url}}" class="text-black hover:text-[#FEC400] transition-colors duration-150 relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-[#FEC400] hover:after:w-full after:transition-all after:duration-200" style="font-family: 'Inter', sans-serif; font-weight: 500; font-style: normal; font-size: clamp(13px, 1.11vw, 16px); line-height: 100%; letter-spacing: 0%; leading-trim: none;">
          {{this.label}}
        </a>
      {{/each}}
    </nav>

    <!-- Hamburger Button (Mobile only) -->
    <button id="mobile-menu-btn" class="lg:hidden flex flex-col justify-center items-center w-8 h-8 space-y-1.5 focus:outline-none cursor-pointer z-50" aria-label="Toggle Menu">
      <span class="w-6 h-0.5 bg-black transition-all duration-300 origin-center" id="hamburger-line-1"></span>
      <span class="w-6 h-0.5 bg-black transition-all duration-300" id="hamburger-line-2"></span>
      <span class="w-6 h-0.5 bg-black transition-all duration-300 origin-center" id="hamburger-line-3"></span>
    </button>
    
    <!-- Dropdown Menu (Mobile only) -->
    <div id="mobile-menu-dropdown" class="hidden absolute top-full left-0 right-0 bg-white border-b border-zinc-100 shadow-md py-4 flex flex-col items-center space-y-4 z-40">
      {{#each header.navLinks}}
        <a href="{{this.url}}" class="mobile-nav-link text-black hover:text-[#FEC400] transition-colors duration-150 w-full text-center py-2 font-medium" style="font-family: 'Inter', sans-serif; font-size: 16px; line-height: 100%; letter-spacing: 0%;">
          {{this.label}}
        </a>
      {{/each}}
    </div>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenuDropdown = document.getElementById('mobile-menu-dropdown');
    const line1 = document.getElementById('hamburger-line-1');
    const line2 = document.getElementById('hamburger-line-2');
    const line3 = document.getElementById('hamburger-line-3');
    const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');

    if (mobileMenuBtn && mobileMenuDropdown) {
      const toggleMenu = () => {
        const isHidden = mobileMenuDropdown.classList.contains('hidden');
        if (isHidden) {
          mobileMenuDropdown.classList.remove('hidden');
          // Animate hamburger to X
          line1.style.transform = 'translateY(8px) rotate(45deg)';
          line2.style.opacity = '0';
          line3.style.transform = 'translateY(-8px) rotate(-45deg)';
        } else {
          mobileMenuDropdown.classList.add('hidden');
          // Animate hamburger back to normal
          line1.style.transform = 'none';
          line2.style.opacity = '1';
          line3.style.transform = 'none';
        }
      };

      mobileMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMenu();
      });

      // Close menu when clicking a link
      mobileNavLinks.forEach(link => {
        link.addEventListener('click', () => {
          mobileMenuDropdown.classList.add('hidden');
          line1.style.transform = 'none';
          line2.style.opacity = '1';
          line3.style.transform = 'none';
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!mobileMenuDropdown.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
          mobileMenuDropdown.classList.add('hidden');
          line1.style.transform = 'none';
          line2.style.opacity = '1';
          line3.style.transform = 'none';
        }
      });
    }
  });
</script>
