<!-- Footer Section -->
<footer class="relative text-white overflow-hidden py-12 md:py-[4.861vw] px-6 md:px-[2.778vw] bg-center bg-no-repeat bg-footer-custom">
  <div class="w-[90%] lg:w-[82vw] max-w-[1180px] mx-auto w-full relative z-10 flex flex-col items-center lg:items-start space-y-6 lg:space-y-[2.222vw]">
    <!-- Logos/Branding -->
    <div class="flex items-center justify-center lg:justify-start space-x-4 lg:space-x-[1.111vw]">
      {{#each footer.logos}}
        {{#unless @first}}
        <span class="h-5 lg:h-[1.389vw] min-h-[16px] w-[1px] bg-white/30 block"></span>
        {{/unless}}
        <img src="{{this.img}}" alt="{{this.alt}}" class="h-[2.5vw] min-h-[22px] max-h-[36px] object-contain w-auto" />
      {{/each}}
    </div>

    <!-- Footer Links -->
    <div class="flex items-center justify-center lg:justify-start gap-6 lg:gap-[2.222vw] flex-wrap w-full lg:w-auto">
      {{#each footer.navLinks}}
      <a href="{{this.url}}" class="text-white hover:text-[#FFCC08] transition-colors duration-150 text-footer-nav-link">
        {{this.label}}
      </a>
      {{/each}}
    </div>

    <!-- Separator Line -->
    <div class="w-full border-t border-white/20"></div>

    <!-- Copyright Notice -->
    <div class="w-full flex justify-center pt-[0.694vw]">
      <p class="text-white/80 font-dm-mono text-xs md:text-sm tracking-wide text-center">
        {{footer.copyright}}
      </p>
    </div>
  </div>
</footer>
